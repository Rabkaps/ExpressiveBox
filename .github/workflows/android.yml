name: Android CI

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Grant Execute Permission to Gradlew
      run: chmod +x gradlew

    - name: Build APKs (Standard & Special)
      run: ./gradlew assembleStandardDebug assembleSpecialDebug

    - name: Rename APKs for Release
      run: |
        cp app/build/outputs/apk/standard/debug/app-standard-debug.apk ExpressiveBox-standard.apk
        cp app/build/outputs/apk/special/debug/app-special-debug.apk ExpressiveBox-special.apk

    - name: Upload ExpressiveBox Standard APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ExpressiveBox-standard-apk
        path: ExpressiveBox-standard.apk

    - name: Upload ExpressiveBox Special APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ExpressiveBox-special-apk
        path: ExpressiveBox-special.apk

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ExpressiveBox-standard.apk
          ExpressiveBox-special.apk
        name: ExpressiveBox ${{ github.ref_name }}
        body_path: .github/release_notes.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
